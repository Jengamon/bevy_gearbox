[package]
name = "bevy_gearbox"
version = "0.5.0"
edition = "2021"
description = "State machine system for the bevy game engine"
license = "MIT OR Apache-2.0"
repository = "https://github.com/DEMIURGE-studio/bevy_gearbox"
homepage = "https://github.com/DEMIURGE-studio/bevy_gearbox"
readme = "README.md"
keywords = ["bevy", "state-machine", "gamedev", "ecs"]
categories = ["game-development", "game-engines"]

[lib]
name = "bevy_gearbox"
path = "src/lib.rs"

[workspace]
members = [
  "crates/bevy_gearbox_editor",
  "crates/bevy_gearbox_macros", 
  "crates/bevy_gearbox_protocol",
]
resolver = "3"

[dependencies]
bevy = { version = "0.18", default-features = false, features = ["bevy_state"] }
bevy_gearbox_macros = { version = "0.4.0", path = "./crates/bevy_gearbox_macros" }
inventory = "0.3.21"
rustversion = "1"

[dev-dependencies]
bevy = "0.18"
# bevy-inspector-egui = "0.35.0"
bevy_gearbox_editor = { version = "0.5.0", path = "./crates/bevy_gearbox_editor" }
bevy_gearbox_protocol = { version = "0.5.0", path = "./crates/bevy_gearbox_protocol", features = ["server"] }

[features]
default = []
# Opt-in flag. Effective only on nightly channel; ignored on stable.

[build-dependencies]
rustc_version = "0.4"

[[example]]
name = "repeater"
path = "examples/repeater.rs"
